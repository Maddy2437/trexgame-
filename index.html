<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Rex: Neon Overdrive - Precision Scale</title>
    <style>
        :root {
            --bg: #f0f0f0; --text: #333; --accent: #555;
            --dino: #333; --cactus: #444; --bird: #222;
            --mtn: #ddd;
        }
        .neon-theme {
            --bg: #000; --text: #fff; --accent: #39FF14;
            --dino: #39FF14; --cactus: #BF00FF; --bird: #00FFFF;
            --mtn: #1a1a1a;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.4s ease;
            user-select: none; touch-action: none;
        }
        canvas { display: block; image-rendering: pixelated; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; pointer-events: none;
        }
        .hud {
            position: absolute; top: 20px; right: 30px;
            font-size: 24px; font-weight: bold; color: var(--text);
        }
        .menu {
            background: var(--bg); padding: 40px; border: 4px solid var(--accent);
            text-align: center; pointer-events: auto; color: var(--text);
            box-shadow: 15px 15px 0 rgba(0,0,0,0.3);
            min-width: 320px;
        }
        .hidden { display: none !important; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .btn {
            background: var(--accent); color: var(--bg);
            padding: 14px 28px; border: none; cursor: pointer;
            font-size: 18px; font-family: inherit; font-weight: bold;
            text-transform: uppercase; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn.quit { background: #ff4444; color: white; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div class="hud">HI <span id="hiScore">00000</span> <span id="curScore">00000</span></div>
    
    <div id="startScreen" class="menu">
        <h1 style="margin:0; font-size: 36px;">NEON OVERDRIVE</h1>
        <p style="margin-top: 10px;">SIZES RECALIBRATED</p>
        <button class="btn" onclick="game.start()">START RUN</button>
    </div>

    <div id="gameOverScreen" class="menu hidden">
        <h1 style="color: #ff4444; font-size: 50px; margin: 0;">OOPS!</h1>
        <p id="finalScoreDisplay" style="font-size: 22px; margin: 15px 0;"></p>
        <div class="btn-container">
            <button class="btn" onclick="game.start()">RESTART</button>
            <button class="btn quit" onclick="game.quit()">QUIT</button>
        </div>
    </div>
</div>

<script>
/**
 * T-REX OVERDRIVE - PRECISION SIZE EDITION
 * Corrected sprite scaling and hitbox ratios.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CONFIG = {
    gravity: 0.9,
    jumpForce: -17,
    px: 4,           // Global Pixel Scale (4px per sprite pixel)
    startSpeed: 10.5,
    maxSpeed: 25,
    speedInc: 0.0025,
    themeInterval: 100
};

// --- SPRITE DATA ---
// Each 1x1 in data = CONFIG.px on screen
const DINO_SPRITE = [
    [9,0,6,1],[9,1,1,1],[12,1,3,1],[9,2,7,1],[9,3,5,1],[9,4,7,1],[0,5,1,1],[7,5,5,1],[0,6,1,1],[6,6,8,1],[0,7,2,1],[5,7,9,1],[0,8,12,1],[1,9,10,1],[2,10,8,1],[3,11,6,1]
];

class Dino {
    constructor() { this.reset(); }
    reset() {
        this.x = 80;
        this.y = 0;
        this.vy = 0;
        this.isJumping = false;
        this.anim = 0;
        this.width = 16 * CONFIG.px;  // 64px
        this.height = 14 * CONFIG.px; // 56px
    }
    update(groundY) {
        let ducking = (game.keys['ArrowDown'] || game.keys['KeyS']) && !this.isJumping;
        this.vy += CONFIG.gravity * (ducking ? 4 : 1);
        this.y += this.vy;
        
        // Dynamic floor collision based on stance
        let h = (ducking ? 8 : 14) * CONFIG.px;
        if (this.y > groundY - h) {
            this.y = groundY - h;
            this.vy = 0;
            this.isJumping = false;
        }
        this.anim += 0.22;
    }
    draw() {
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--dino');
        ctx.save();
        ctx.translate(this.x, this.y);
        
        let ducking = (game.keys['ArrowDown'] || game.keys['KeyS']) && !this.isJumping;
        
        if (ducking) {
            // Flattened duck sprite
            ctx.fillRect(0, 4*CONFIG.px, 16*CONFIG.px, 4*CONFIG.px);
            ctx.fillRect(8*CONFIG.px, 0, 8*CONFIG.px, 4*CONFIG.px);
        } else {
            DINO_SPRITE.forEach(s => ctx.fillRect(s[0]*CONFIG.px, s[1]*CONFIG.px, s[2]*CONFIG.px, s[3]*CONFIG.px));
            if (!this.isJumping) {
                const leg = Math.floor(this.anim) % 2 === 0 ? 4 : 10;
                ctx.fillRect(leg * CONFIG.px, 13 * CONFIG.px, 2 * CONFIG.px, 2 * CONFIG.px);
            }
        }
        ctx.restore();
    }
    getRect() {
        let duck = (game.keys['ArrowDown'] || game.keys['KeyS']) && !this.isJumping;
        // Inner padding for fair collision
        return { 
            x: this.x + 8, 
            y: this.y + (duck ? 16 : 4), 
            w: this.width - 24, 
            h: (duck ? 16 : this.height - 8) 
        };
    }
}

class Obstacle {
    constructor(speed, groundY, type) {
        this.type = type;
        this.x = canvas.width;
        this.speed = speed;
        this.anim = 0;

        if (type === 'cactus') {
            const variant = Math.random();
            if (variant > 0.7) { // Tall/Skinny
                this.w = 4 * CONFIG.px; this.h = 14 * CONFIG.px;
            } else if (variant > 0.4) { // Wide/Branched
                this.w = 8 * CONFIG.px; this.h = 10 * CONFIG.px;
            } else { // Small
                this.w = 5 * CONFIG.px; this.h = 8 * CONFIG.px;
            }
            this.y = groundY - this.h;
        } else { // Bird
            this.w = 14 * CONFIG.px; 
            this.h = 8 * CONFIG.px;
            // Bird heights: Low (Jump), High (Duck)
            this.y = groundY - (Math.random() > 0.5 ? 145 : 60);
        }
    }
    update() { this.x -= this.speed; this.anim += 0.2; }
    draw() {
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue(this.type === 'cactus' ? '--cactus' : '--bird');
        if (this.type === 'cactus') {
            // Organic cactus shape logic
            ctx.fillRect(this.x + (this.w/4), this.y, this.w/2, this.h); // Trunk
            ctx.fillRect(this.x, this.y + (this.h*0.3), CONFIG.px, this.h*0.3); // Left Arm
            ctx.fillRect(this.x + this.w - CONFIG.px, this.y + (this.h*0.2), CONFIG.px, this.h*0.4); // Right Arm
        } else {
            const wingPos = Math.floor(this.anim) % 2 === 0 ? 0 : 6*CONFIG.px;
            ctx.fillRect(this.x, this.y + 2*CONFIG.px, this.w, 3*CONFIG.px); // Body
            ctx.fillRect(this.x + 4*CONFIG.px, this.y + wingPos, 6*CONFIG.px, 2*CONFIG.px); // Wing
        }
    }
}

const game = {
    state: 'MENU', score: 0, hiScore: localStorage.getItem('vanguard_hi_v2') || 0,
    speed: CONFIG.startSpeed, keys: {}, groundY: 0,
    obstacles: [], bg: [], nextSpawn: 0, lastTheme: 0,

    init() {
        this.resize(); this.player = new Dino();
        // Static BG elements
        for(let i=0; i<15; i++) this.bg.push({x: Math.random()*canvas.width, y: Math.random()*200, s: Math.random()*0.2+0.05, w: Math.random()*100+40});
        
        window.onkeydown = e => { 
            this.keys[e.code]=true; 
            if(e.code==='Space'||e.code==='ArrowUp') {
                if(this.state==='PLAYING') this.player.jump();
                else if(this.state==='MENU') this.start();
            }
        };
        window.onkeyup = e => this.keys[e.code]=false;
        window.onresize = () => this.resize();
        this.loop();
    },
    resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; this.groundY = canvas.height * 0.75; },
    start() {
        this.score = 0; this.speed = CONFIG.startSpeed; this.obstacles = [];
        this.state = 'PLAYING'; this.player.reset(); this.lastTheme = 0;
        document.body.classList.remove('neon-theme');
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        this.nextSpawn = Date.now() + 200;
    },
    quit() {
        this.state = 'MENU';
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
        document.body.classList.remove('neon-theme');
    },
    loop() {
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg');
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Background Parallax
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--mtn');
        this.bg.forEach(b => {
            ctx.fillRect(b.x, b.y, b.w, 2);
            if(this.state === 'PLAYING') { b.x -= b.s * this.speed; if(b.x < -b.w) b.x = canvas.width; }
        });

        // Floor
        ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--text');
        ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, this.groundY); ctx.lineTo(canvas.width, this.groundY); ctx.stroke();

        if (this.state === 'PLAYING') {
            this.score += 0.25;
            let currentTheme = Math.floor(this.score / CONFIG.themeInterval);
            if (currentTheme !== this.lastTheme) { document.body.classList.toggle('neon-theme'); this.lastTheme = currentTheme; }
            this.speed = Math.min(CONFIG.maxSpeed, this.speed + CONFIG.speedInc);
            this.player.update(this.groundY);

            // Frequent Spawning Engine
            if (Date.now() > this.nextSpawn) {
                const isBird = this.score > 250 && Math.random() > 0.7;
                if (isBird) {
                    this.obstacles.push(new Obstacle(this.speed, this.groundY, 'bird'));
                } else {
                    const cluster = Math.random() > 0.6 ? 3 : (Math.random() > 0.3 ? 2 : 1);
                    let xOff = 0;
                    for(let i=0; i<cluster; i++) {
                        let o = new Obstacle(this.speed, this.groundY, 'cactus');
                        o.x += xOff; this.obstacles.push(o);
                        xOff += o.w + (Math.random()*40 + 15); // Tight spacing
                    }
                }
                // Shortened spawn interval
                const delay = (500 + Math.random()*800) - (this.speed * 10);
                this.nextSpawn = Date.now() + Math.max(350, delay);
            }

            for (let i = this.obstacles.length - 1; i >= 0; i--) {
                const o = this.obstacles[i]; o.update(); o.draw();
                const r1 = this.player.getRect();
                // Collision check
                if (r1.x < o.x + o.w && r1.x + r1.w > o.x && r1.y < o.y + o.h && r1.y + r1.h > o.y) {
                    this.state = 'GAMEOVER';
                    if (this.score > this.hiScore) { this.hiScore = Math.floor(this.score); localStorage.setItem('vanguard_hi_v2', this.hiScore); }
                    document.getElementById('gameOverScreen').classList.remove('hidden');
                    document.getElementById('finalScoreDisplay').innerText = `SCORE: ${Math.floor(this.score)}`;
                }
                if (o.x < -300) this.obstacles.splice(i, 1);
            }
        }
        
        this.player.draw();
        document.getElementById('curScore').innerText = Math.floor(this.score).toString().padStart(5, '0');
        document.getElementById('hiScore').innerText = Math.floor(this.hiScore).toString().padStart(5, '0');
        requestAnimationFrame(() => this.loop());
    }
};

Dino.prototype.jump = function() { if (!this.isJumping) { this.vy = CONFIG.jumpForce; this.isJumping = true; } };
game.init();
</script>
</body>
</html>
