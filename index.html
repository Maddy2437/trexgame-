<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Rex Classic: Balanced Edition</title>
    <style>
        :root {
            --bg: #f7f7f7; --text: #535353; --accent: #535353;
            --dino: #535353; --cactus: #535353; --bird: #535353;
            --mtn: #dbdbdb;
        }
        .neon-theme {
            --bg: #000; --text: #fff; --accent: #39FF14;
            --dino: #39FF14; --cactus: #BF00FF; --bird: #00FFFF;
            --mtn: #1a1a1a;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.4s ease;
            user-select: none; touch-action: none;
        }
        canvas { display: block; image-rendering: pixelated; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; pointer-events: none;
        }
        .hud {
            position: absolute; top: 20px; right: 30px;
            font-size: 24px; font-weight: bold; color: var(--text);
        }
        .menu {
            background: var(--bg); padding: 40px; border: 2px solid var(--accent);
            text-align: center; pointer-events: auto; color: var(--text);
        }
        .hidden { display: none !important; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .btn {
            background: var(--accent); color: var(--bg);
            padding: 12px 24px; border: none; cursor: pointer;
            font-size: 18px; font-family: inherit; font-weight: bold;
            text-transform: uppercase;
        }
        .btn.quit { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div class="hud">HI <span id="hiScore">00000</span> <span id="curScore">00000</span></div>
    
    <div id="startScreen" class="menu">
        <h1 style="margin:0;">T-REX RUNNER</h1>
        <p>REDUCED OBSTACLES</p>
        <button class="btn" onclick="game.start()">START</button>
    </div>

    <div id="gameOverScreen" class="menu hidden">
        <h1 style="margin: 0;">OOPS!</h1>
        <p id="finalScoreDisplay"></p>
        <div class="btn-container">
            <button class="btn" onclick="game.start()">RESTART</button>
            <button class="btn quit" onclick="game.quit()">QUIT</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CONFIG = {
    gravity: 0.9,
    jumpForce: -16,
    px: 4,
    startSpeed: 10,
    maxSpeed: 22,
    speedInc: 0.0015,
    themeInterval: 100
};

// Precise Dino Sprite Mapping
const DINO_SPRITE = [
    [9,0,6,1], [9,1,1,1], [12,1,3,1], [9,2,7,1], [9,3,5,1], [9,4,7,1],
    [0,5,1,1], [7,5,5,1], [0,6,1,1], [6,6,8,1], [0,7,2,1], [5,7,9,1],
    [0,8,12,1], [1,9,10,1], [2,10,8,1], [3,11,6,1]
];

// Precise Cactus Sprite Mapping
const CACTUS_SPRITE = [[3, 0, 2, 10], [2, 2, 1, 3], [5, 3, 1, 4], [0, 1, 1, 1], [3, 2, 1, 1]];

class Dino {
    constructor() { this.reset(); }
    reset() {
        this.x = 80; this.y = 0; this.vy = 0;
        this.isJumping = false; this.anim = 0;
        this.width = 16 * CONFIG.px; this.height = 14 * CONFIG.px;
    }
    update(groundY) {
        let ducking = (game.keys['ArrowDown'] || game.keys['KeyS']) && !this.isJumping;
        this.vy += CONFIG.gravity * (ducking ? 4 : 1);
        this.y += this.vy;
        let h = (ducking ? 8 : 14) * CONFIG.px;
        if (this.y > groundY - h) { this.y = groundY - h; this.vy = 0; this.isJumping = false; }
        this.anim += 0.2;
    }
    draw() {
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--dino');
        ctx.save(); ctx.translate(this.x, this.y);
        let ducking = (game.keys['ArrowDown'] || game.keys['KeyS']) && !this.isJumping;
        if (ducking) {
            ctx.fillRect(0, 5*CONFIG.px, 16*CONFIG.px, 4*CONFIG.px);
            ctx.fillRect(8*CONFIG.px, 1*CONFIG.px, 8*CONFIG.px, 4*CONFIG.px);
        } else {
            DINO_SPRITE.forEach(s => ctx.fillRect(s[0]*CONFIG.px, s[1]*CONFIG.px, s[2]*CONFIG.px, s[3]*CONFIG.px));
            if (!this.isJumping) {
                const leg = Math.floor(this.anim) % 2 === 0 ? 4 : 10;
                ctx.fillRect(leg * CONFIG.px, 13 * CONFIG.px, 2 * CONFIG.px, 2 * CONFIG.px);
            }
        }
        ctx.restore();
    }
    getRect() {
        let duck = (game.keys['ArrowDown'] || game.keys['KeyS']) && !this.isJumping;
        return { x: this.x + 10, y: this.y + (duck ? 18 : 6), w: this.width - 20, h: (duck ? 14 : this.height - 12) };
    }
}

class Obstacle {
    constructor(speed, groundY, type) {
        this.type = type; this.x = canvas.width; this.speed = speed; this.anim = 0;
        if (type === 'cactus') {
            this.w = 8 * CONFIG.px; this.h = 10 * CONFIG.px;
            this.y = groundY - this.h;
        } else {
            this.w = 12 * CONFIG.px; this.h = 6 * CONFIG.px;
            this.y = groundY - (Math.random() > 0.5 ? 140 : 60);
        }
    }
    update() { this.x -= this.speed; this.anim += 0.15; }
    draw() {
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue(this.type === 'cactus' ? '--cactus' : '--bird');
        if (this.type === 'cactus') {
            CACTUS_SPRITE.forEach(s => ctx.fillRect(this.x + s[0]*CONFIG.px, this.y + s[1]*CONFIG.px, s[2]*CONFIG.px, s[3]*CONFIG.px));
        } else {
            const flap = Math.floor(this.anim) % 2 === 0 ? 0 : 5*CONFIG.px;
            ctx.fillRect(this.x, this.y + 2*CONFIG.px, this.w, 3*CONFIG.px);
            ctx.fillRect(this.x + 4*CONFIG.px, this.y + flap, 6*CONFIG.px, 2*CONFIG.px);
        }
    }
}

const game = {
    state: 'MENU', score: 0, hiScore: localStorage.getItem('trex_hi_vfinal') || 0,
    speed: CONFIG.startSpeed, keys: {}, groundY: 0,
    obstacles: [], bg: [], nextSpawn: 0, lastTheme: 0,

    init() {
        this.resize(); this.player = new Dino();
        for(let i=0; i<10; i++) this.bg.push({x: Math.random()*canvas.width, y: Math.random()*200, s: 0.1, w: 40});
        window.onkeydown = e => { this.keys[e.code]=true; if(e.code==='Space'||e.code==='ArrowUp') this.state==='PLAYING' ? this.player.jump() : (this.state==='MENU' && this.start()); };
        window.onkeyup = e => this.keys[e.code]=false;
        window.onresize = () => this.resize();
        this.loop();
    },
    resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; this.groundY = canvas.height * 0.75; },
    start() {
        this.score = 0; this.speed = CONFIG.startSpeed; this.obstacles = [];
        this.state = 'PLAYING'; this.player.reset(); this.lastTheme = 0;
        document.body.classList.remove('neon-theme');
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        this.nextSpawn = Date.now() + 1000;
    },
    quit() {
        this.state = 'MENU';
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
        document.body.classList.remove('neon-theme');
    },
    loop() {
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg');
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--mtn');
        this.bg.forEach(b => {
            ctx.fillRect(b.x, b.y, b.w, 2);
            if(this.state === 'PLAYING') { b.x -= b.s * this.speed; if(b.x < -b.w) b.x = canvas.width; }
        });
        ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--text');
        ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, this.groundY); ctx.lineTo(canvas.width, this.groundY); ctx.stroke();

        if (this.state === 'PLAYING') {
            this.score += 0.2;
            let currentTheme = Math.floor(this.score / CONFIG.themeInterval);
            if (currentTheme !== this.lastTheme) { document.body.classList.toggle('neon-theme'); this.lastTheme = currentTheme; }
            this.speed = Math.min(CONFIG.maxSpeed, this.speed + CONFIG.speedInc);
            this.player.update(this.groundY);

            // REDUCED OBSTACLE FREQUENCY
            if (Date.now() > this.nextSpawn) {
                const isBird = this.score > 300 && Math.random() > 0.8;
                this.obstacles.push(new Obstacle(this.speed, this.groundY, isBird ? 'bird' : 'cactus'));
                
                // Increased delay between spawns for 10% reduction
                const delay = (1000 + Math.random()*1500) - (this.speed * 15);
                this.nextSpawn = Date.now() + Math.max(700, delay);
            }

            for (let i = this.obstacles.length - 1; i >= 0; i--) {
                const o = this.obstacles[i]; o.update(); o.draw();
                const r1 = this.player.getRect();
                if (r1.x < o.x + o.w && r1.x + r1.w > o.x && r1.y < o.y + o.h && r1.y + r1.h > o.y) {
                    this.state = 'GAMEOVER';
                    if (this.score > this.hiScore) { this.hiScore = Math.floor(this.score); localStorage.setItem('trex_hi_vfinal', this.hiScore); }
                    document.getElementById('gameOverScreen').classList.remove('hidden');
                    document.getElementById('finalScoreDisplay').innerText = `SCORE: ${Math.floor(this.score)}`;
                }
                if (o.x < -200) this.obstacles.splice(i, 1);
            }
        }
        this.player.draw();
        document.getElementById('curScore').innerText = Math.floor(this.score).toString().padStart(5, '0');
        document.getElementById('hiScore').innerText = Math.floor(this.hiScore).toString().padStart(5, '0');
        requestAnimationFrame(() => this.loop());
    }
};

Dino.prototype.jump = function() { if (!this.isJumping) { this.vy = CONFIG.jumpForce; this.isJumping = true; } };
game.init();
</script>
</body>
</html>
